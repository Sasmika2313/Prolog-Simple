<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Fault Diagnosis (Prolog backend)</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f0f8ff; color: #003366; margin:0; padding:0; }
    .container { max-width:600px; margin:50px auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align:center; color:#0055aa; }
    label { display:block; margin-top:20px; font-weight:bold; }
    select, button { width:100%; padding:10px; margin-top:5px; border-radius:4px; border:1px solid #aaccee; }
    button { background-color:#0077cc; color:white; border:none; cursor:pointer; margin-top:30px; }
    button:hover { background-color:#005fa3; }
    .result { margin-top:30px; padding:20px; background-color:#e6f2ff; border-radius:4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vehicle Fault Diagnosis</h1>

    <form id="diagnoseForm">
      <label for="engine_cranks">Does the engine crank when you turn the key? (yes/no)</label>
      <select id="engine_cranks" name="engine_cranks">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="battery_ok">Is the battery okay? (yes/no)</label>
      <select id="battery_ok" name="battery_ok">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="lights_dim">Do the lights appear dim or does the car struggle to start? (yes/no)</label>
      <select id="lights_dim" name="lights_dim">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="brake_noise">Do you hear squealing or grinding when you brake? (yes/no)</label>
      <select id="brake_noise" name="brake_noise">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="engine_overheat">Is the engine temperature gauge high or is a warning light on? (yes/no)</label>
      <select id="engine_overheat" name="engine_overheat">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="engine_power_loss">Does the engine lose power when accelerating? (yes/no)</label>
      <select id="engine_power_loss" name="engine_power_loss">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="steering_vibrate">Does the car pull to one side or does the steering wheel vibrate? (yes/no)</label>
      <select id="steering_vibrate" name="steering_vibrate">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="engine_cranks_but_not_start">Does the engine crank but fail to start? (yes/no)</label>
      <select id="engine_cranks_but_not_start" name="engine_cranks_but_not_start">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <label for="alternator_ok">Is the alternator functioning properly? (yes/no)</label>
      <select id="alternator_ok" name="alternator_ok">
        <option value="yes">Yes</option>
        <option value="no">No</option>
      </select>

      <button type="submit">Diagnose Fault</button>
    </form>

    <div class="result" id="resultDiv" style="display:none;">
      <h2>Diagnosis Result:</h2>
      <ul id="resultList"></ul>
    </div>
  </div>

  <script>
    document.getElementById("diagnoseForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const payload = {};
      formData.forEach((value, key) => { payload[key] = value; });

      const response = await fetch("/diagnose", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const text = await response.text();
        alert("Error during diagnosis: " + text);
        return;
      }

      const data = await response.json();
      const list = document.getElementById("resultList");
      list.innerHTML = "";
      data.faults.forEach(fault => {
        const li = document.createElement("li");
        li.textContent = fault;
        list.appendChild(li);
      });
      document.getElementById("resultDiv").style.display = "block";
    });
  </script>
</body>
</html>
